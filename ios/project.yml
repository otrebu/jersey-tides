# XcodeGen spec — regenerate with `xcodegen generate` after every edit.
# The generated .xcodeproj is gitignored; never hand-edit the .pbxproj.
#
# NOTE (orchestrator decision): the TidesCore SwiftPM package is deliberately
# NOT declared here yet — the engine port lands in parallel and the integrator
# (chunk I) adds the `packages:` block plus both `package: TidesCore` target
# dependencies. Until then the app runs on SyntheticEngine behind the
# TideEngine facade (Shared/Engine/); nothing may import TidesCore.
name: JerseyTides
options:
  bundleIdPrefix: je.ub
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: XXXXXXXXXX # placeholder — fill from Xcode ▸ Settings ▸ Accounts
    CODE_SIGN_STYLE: Automatic
targets:
  JerseyTides:
    type: application
    platform: iOS
    sources:
      - App
      - Shared
      # Widget family views + error tile are compiled into the app too so the
      # DEBUG widget gallery (-harness widgets) can render every entry view
      # directly (implementation plan §4 "DebugWidgetGallery spec").
      - Widget/Families
      - Widget/ErrorTileView.swift
    dependencies:
      - target: JerseyTidesWidget
        embed: true # embeds the appex
    info:
      path: App/Info.plist # XcodeGen generates it
      properties:
        CFBundleDisplayName: Jersey Tides
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleURLName: je.ub.tides
            CFBundleURLSchemes: [jerseytides]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: je.ub.tides
  JerseyTidesWidget:
    type: app-extension # WidgetKit extension
    platform: iOS
    sources: [Widget, Shared]
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Jersey Tides
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: je.ub.tides.widget
  JerseyTidesTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Tests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: JerseyTides
schemes:
  JerseyTides:
    build:
      targets: { JerseyTides: all }
    run:
      config: Debug
    test:
      targets: [JerseyTidesTests]
